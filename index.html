<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WebPKI Policy Reference</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #fdfdfb;
    --bg-alt: #f3f1ec;
    --fg: #1c1c1c;
    --muted: #6a6a6a;
    --accent: #2c5d8f;
    --accent-bg: #e8f0f8;
    --link: #1e4d80;
    --link-hover: #102a4a;
    --border: #d9d6cf;
    --warn: #b88600;
    --warn-bg: #fff3d6;
    --code-bg: #efece4;
    --note-bg: #fffceb;
    --note-border: #e1dbb6;
    --highlight: #fff09a;
    --ok: #2e7d32;
    --info: #c08400;
    --bad: #c62828;
    --na: #888;
    --unreviewed: #a854b3;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.5;
  }
  header {
    background: var(--bg-alt);
    border-bottom: 1px solid var(--border);
    padding: 10px 18px;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  header h1 {
    margin: 0 0 6px 0;
    font-size: 15px;
    font-weight: 600;
  }
  .nav-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
  }
  .nav-label {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-right: 4px;
  }
  .navbtn {
    border: 1px solid var(--border);
    background: white;
    color: var(--fg);
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 12.5px;
    cursor: pointer;
    font-family: inherit;
  }
  .navbtn:hover { background: var(--accent-bg); }
  .navbtn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .controls {
    margin-left: auto;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .controls button {
    background: white;
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .controls button:hover { background: var(--accent-bg); }
  .controls button:disabled {
    background: var(--bg-alt);
    color: var(--muted);
    cursor: not-allowed;
  }
  .controls button:disabled:hover { background: var(--bg-alt); }
  .controls .repo-link {
    background: white;
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-family: inherit;
    color: var(--fg);
    text-decoration: none;
  }
  .controls .repo-link:hover { background: var(--accent-bg); }

  /* Loaded-sets bar */
  .loaded-sets-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    padding: 6px 0 0;
    font-size: 12px;
  }
  .loaded-sets-bar .label {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-right: 4px;
  }
  .loaded-set-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 4px 2px 9px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 11px;
    font-size: 11px;
  }
  .loaded-set-chip.mismatch {
    border-color: var(--warn);
    background: var(--warn-bg);
  }
  .loaded-set-chip .vmark {
    color: var(--warn);
    font-weight: 600;
  }
  .loaded-set-chip .remove-btn {
    cursor: pointer;
    color: var(--muted);
    background: none;
    border: none;
    padding: 0 4px;
    font-size: 14px;
    line-height: 1;
    font-family: inherit;
    border-radius: 50%;
  }
  .loaded-set-chip .remove-btn:hover {
    color: white;
    background: #c62828;
  }

  main {
    padding: 16px 18px 80px;
    max-width: 1600px;
    margin: 0 auto;
  }

  /* Document title */
  .doc-title {
    font-size: 22px;
    margin: 4px 0 2px;
  }
  .doc-title .doc-version {
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    margin-left: 6px;
  }
  .doc-meta {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 12px;
  }

  /* Section row: a CSS grid where each commentable element produces 3+N
     cells (ref, content, status, then one comments cell per source). The
     grid auto-flows 3+N cells per row; each row's height is max(content,
     comments), so tall comments push the next element's row down. */
  .section-row {
    display: grid;
    grid-template-columns:
      [refs] 90px
      [content] minmax(0, 1fr)
      [status] 5px
      [comments] repeat(var(--side-count, 1), var(--side-width, 340px));
    column-gap: 10px;
    row-gap: 4px;
    padding: 6px 0;
    align-items: start;
  }

  /* Per-element grid cells */
  .elt-ref {
    font-family: ui-monospace, monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: right;
    padding-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.4;
  }
  .elt-ref a { color: inherit; text-decoration: none; }
  .elt-ref a:hover { color: var(--accent); text-decoration: underline; }
  .elt-ref.section-ref a { font-weight: 700; color: var(--fg); }

  .elt-status {
    min-width: 5px;
    border-radius: 2px;
    align-self: stretch;
  }
  .elt-status.compliant     { background: var(--ok); }
  .elt-status.need-info     { background: var(--info); }
  .elt-status.noncompliant  { background: var(--bad); }
  .elt-status.na            { background: var(--na); }
  .elt-status.unreviewed    { background: var(--unreviewed); }

  .elt-content {
    min-width: 0;
  }
  .elt-content > :first-child { margin-top: 0; }
  .elt-content > :last-child  { margin-bottom: 0; }
  .elt-content h1, .elt-content h2, .elt-content h3,
  .elt-content h4, .elt-content h5, .elt-content h6 {
    scroll-margin-top: 80px;
    position: relative;
  }
  .elt-content h1 { font-size: 19px; border-bottom: 2px solid var(--border); padding-bottom: 3px; }
  .elt-content h2 { font-size: 17px; }
  .elt-content h3 { font-size: 15px; }
  .elt-content h4 { font-size: 14px; }
  .elt-content h5 { font-size: 13.5px; }
  .elt-content h6 { font-size: 13px; color: var(--muted); }
  .elt-content pre {
    background: var(--code-bg);
    border-radius: 4px;
    padding: 8px 10px;
    overflow-x: auto;
    font-size: 12px;
  }
  .elt-content code {
    background: var(--code-bg);
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 12.5px;
  }
  .elt-content pre code { background: none; padding: 0; }
  .elt-content table {
    border-collapse: collapse;
    margin: 0;
    font-size: 12.5px;
    max-width: 100%;
  }
  .elt-content table th, .elt-content table td {
    border: 1px solid var(--border);
    padding: 4px 8px;
    vertical-align: top;
  }
  .elt-content table th { background: var(--bg-alt); }
  /* Split single-item lists tighten up — drop the default top/bottom margin
     so consecutive li-rows visually flow as one list. */
  .elt-content > ul, .elt-content > ol { margin: 0; }
  .elt-content blockquote {
    border-left: 3px solid var(--accent);
    background: var(--accent-bg);
    margin: 8px 0;
    padding: 6px 12px;
  }
  .elt-content a { color: var(--link); }

  /* Per-element commentable wrapper styling. Scope hover/active/flash to
     elements inside the content cell — the .elt-status and .elt-comments
     cells also carry data-elt-id (for find/repaint), and we don't want
     hovering them to wipe out their colored background. */
  [data-elt-id] {
    position: relative;
  }
  .elt-content [data-elt-id]:hover {
    background: rgba(255, 240, 154, 0.18);
  }
  .elt-content [data-elt-id].active-target {
    background: rgba(255, 240, 154, 0.45);
  }
  .elt-content [data-elt-id].flash {
    animation: flash 1.8s ease-out;
  }
  @keyframes flash {
    0%   { background: var(--highlight); }
    100% { background: transparent; }
  }

  /* Per-element "comment +N" affordance — absolutely positioned at right margin */
  .elt-handle {
    position: absolute;
    right: -28px;
    top: 0;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 1px 6px;
    border-radius: 10px;
    background: white;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.08s;
    user-select: none;
    font-family: ui-monospace, monospace;
    z-index: 4;
    white-space: nowrap;
  }
  [data-elt-id]:hover > .elt-handle,
  tr[data-elt-id]:hover .elt-handle.row-handle,
  .elt-handle.active-target {
    opacity: 1;
  }
  .elt-handle:hover {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .elt-handle.has-comments {
    background: var(--warn-bg);
    color: var(--warn);
    border-color: var(--note-border);
  }
  .elt-handle .count { font-weight: 700; }
  li > .elt-handle { right: -32px; }
  /* Row handle lives inside the last <td> of the row, positioned at the row's right edge. */
  td.has-row-handle { position: relative; }
  .elt-handle.row-handle {
    right: -32px;
    top: 50%;
    transform: translateY(-50%);
  }

  /* One comments cell per row × per source (local + each loaded set).
     Cards are in normal flow inside the cell; the cell's height stretches
     its grid row so the next paragraph pushes down beyond all comments. */
  .elt-comments {
    padding-left: 12px;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .comment-card {
    background: var(--note-bg);
    border: 1px solid var(--note-border);
    border-radius: 5px;
    padding: 6px 8px;
    font-size: 12.5px;
  }
  .comment-card.readonly {
    background: #f4f3ee;
    border-color: var(--border);
    color: #444;
  }
  .comment-card .ref-chip {
    display: inline-block;
    background: var(--accent-bg);
    color: var(--link);
    padding: 0 6px;
    border-radius: 8px;
    font-size: 10px;
    font-family: ui-monospace, monospace;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .comment-card .ref-chip:hover {
    background: var(--accent);
    color: white;
  }
  .comment-card .ref-chip.section-ref {
    background: var(--bg-alt);
    font-style: italic;
  }
  .comment-card .delete-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    padding: 0 4px;
    line-height: 1;
    border-radius: 50%;
  }
  .comment-card .delete-btn:hover {
    color: white;
    background: #c62828;
  }
  .comment-card textarea {
    width: 100%;
    min-height: 60px;
    border: 1px solid var(--note-border);
    background: white;
    border-radius: 3px;
    padding: 4px 6px;
    font: inherit;
    font-size: 12.5px;
    resize: vertical;
    margin-top: 4px;
    outline: none;
  }
  .comment-card textarea:focus { border-color: var(--accent); }
  .comment-card .rendered {
    margin-top: 4px;
    font-size: 12.5px;
  }
  .comment-card .rendered p { margin: 4px 0; }
  .comment-card .rendered ul, .comment-card .rendered ol { margin: 4px 0; padding-left: 18px; }
  .comment-card .meta {
    color: var(--muted);
    font-size: 10px;
    margin-top: 4px;
    display: flex;
    justify-content: space-between;
  }
  .comment-card .toolbar {
    display: flex;
    gap: 4px;
    margin-top: 4px;
  }
  .comment-card .toolbar button {
    font-size: 10.5px;
    padding: 2px 8px;
    border: 1px solid var(--border);
    background: white;
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
  }
  .comment-card .toolbar button:hover { background: var(--accent-bg); }

  /* Per-comment review status buttons */
  .review-status-row {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    margin-top: 5px;
  }
  .review-btn {
    font-size: 10.5px;
    padding: 2px 8px;
    border: 1px solid var(--border);
    background: white;
    color: var(--fg);
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    user-select: none;
  }
  .review-btn:hover { background: var(--accent-bg); }
  .review-btn.active.compliant    { background: var(--ok);   color: white; border-color: var(--ok); }
  .review-btn.active.need-info    { background: var(--info); color: white; border-color: var(--info); }
  .review-btn.active.noncompliant { background: var(--bad);  color: white; border-color: var(--bad); }
  .review-btn.active.na           { background: var(--na);   color: white; border-color: var(--na); }

  /* Read-only status pill (shown on loaded-set comments) */
  .readonly-status {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 10px;
    font-size: 10.5px;
    color: white;
    margin-top: 5px;
    text-transform: none;
    letter-spacing: 0;
  }
  .readonly-status.compliant    { background: var(--ok); }
  .readonly-status.need-info    { background: var(--info); }
  .readonly-status.noncompliant { background: var(--bad); }
  .readonly-status.na           { background: var(--na); }
  /* Cross-reference link styling (inside notes) */
  .xref {
    color: var(--link);
    text-decoration: underline;
    text-decoration-style: dotted;
    text-decoration-color: var(--accent);
    text-underline-offset: 2px;
    cursor: pointer;
  }
  .xref:hover {
    background: var(--accent-bg);
    text-decoration-style: solid;
  }
  .xref.broken {
    color: #c62828;
    text-decoration-color: #c62828;
  }

  mark { background: var(--highlight); padding: 0 1px; }

  .doc-loading {
    color: var(--muted);
    font-style: italic;
    padding: 24px 8px;
  }
  .doc-error {
    color: var(--bad);
    background: #fff0f0;
    border: 1px solid var(--bad);
    border-radius: 4px;
    padding: 8px 12px;
    margin: 12px 0;
  }

  /* TOC sidebar */
  .toc-wrap {
    background: var(--bg-alt);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    margin: 8px 0 16px;
    font-size: 12.5px;
  }
  .toc-wrap summary { cursor: pointer; font-weight: 600; }
  .toc-wrap .toc-grid {
    margin-top: 8px;
    columns: 2;
    column-gap: 18px;
  }
  .toc-wrap a {
    display: block;
    text-decoration: none;
    color: var(--link);
    padding: 1px 0;
    break-inside: avoid;
  }
  .toc-wrap a:hover { color: var(--accent); text-decoration: underline; }
  .toc-wrap a[data-lvl="1"] { font-weight: 600; }
  .toc-wrap a[data-lvl="2"] { padding-left: 8px; }
  .toc-wrap a[data-lvl="3"] { padding-left: 16px; }
  .toc-wrap a[data-lvl="4"] { padding-left: 24px; font-size: 12px; }
  .toc-wrap a[data-lvl="5"], .toc-wrap a[data-lvl="6"] { padding-left: 32px; font-size: 11.5px; color: var(--muted); }

  /* Manifest page */
  .manifest-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .manifest-table th, .manifest-table td {
    border: 1px solid var(--border);
    padding: 4px 8px;
    vertical-align: top;
    text-align: left;
  }
  .manifest-table th { background: var(--bg-alt); position: sticky; top: 56px; }
  .manifest-table tr:hover { background: var(--accent-bg); }
  .manifest-table .ref {
    font-family: ui-monospace, monospace;
    font-size: 11px;
    white-space: nowrap;
  }

  @media (max-width: 1100px) {
    /* Collapse the multi-column grid: each row becomes a 1-column block,
       with the ref/status cells hidden and comments stacked below content. */
    .section-row { grid-template-columns: 1fr !important; }
    .elt-ref, .elt-status { display: none; }
    .elt-comments {
      border-top: 1px solid var(--border);
      padding-left: 0;
      padding-top: 6px;
    }
    .elt-handle { right: 0; top: -22px; }
  }
</style>
</head>
<body>

<header>
  <h1>WebPKI Policy Reference</h1>
  <div class="nav-row">
    <span class="nav-label">Docs:</span>
    <span id="docNav"></span>
    <button class="navbtn" data-route="#manifest" title="All commentable IDs">Manifest</button>
    <div class="controls">
      <button id="undoBtn" disabled title="Nothing to undo">Undo</button>
      <button id="exportBtn" title="Download your comments as JSON">Export</button>
      <button id="importFileBtn" title="Load a comments JSON as a read-only column">Load file…</button>
      <button id="importUrlBtn" title="Load a comments JSON from a URL">Load URL…</button>
      <input id="importInput" type="file" accept="application/json" style="display:none">
      <a class="repo-link" href="https://github.com/mcpherrinm/webpki-policy-docs" target="_blank" rel="noopener" title="View source on GitHub">GitHub</a>
    </div>
  </div>
  <div id="loadedSetsBar" class="loaded-sets-bar" style="display:none"></div>
</header>

<main id="content"></main>

<script src="build/marked.min.js"></script>

<script>
"use strict";

// ===== Runtime-loaded data (id-manifest.json) =====
//
// id-manifest.json carries the doc registry (label/version/path) and the
// flat list of commentable refs. Markdown bodies are fetched lazily from the
// path declared in the manifest and cached in memory.

let SRC_DATA     = {};   // {<docKey>: {label, version, path, filename, title, section_count, elt_count}}
let SRC_KEYS     = [];
let SRC_LABELS   = {};
let SRC_VERSIONS = {};
let MANIFEST     = [];
const MD_CACHE   = new Map();  // docKey -> markdown body (string)

function docVersion(docKey) { return SRC_VERSIONS[docKey] || ""; }

async function loadManifest() {
  const resp = await fetch("id-manifest.json", { cache: "no-cache" });
  if (!resp.ok) throw new Error("Failed to load id-manifest.json: HTTP " + resp.status);
  const data = await resp.json();
  for (const d of (data.docs || [])) {
    SRC_KEYS.push(d.key);
    SRC_LABELS[d.key]   = d.label;
    SRC_VERSIONS[d.key] = d.version;
    SRC_DATA[d.key] = {
      label: d.label,
      version: d.version,
      path: d.path,
      filename: d.path,
      title: d.title || null,
      section_count: d.section_count || 0,
      elt_count: d.elt_count || 0,
    };
  }
  MANIFEST = data.entries || [];
}

async function getMarkdown(docKey) {
  if (MD_CACHE.has(docKey)) return MD_CACHE.get(docKey);
  const doc = SRC_DATA[docKey];
  if (!doc) throw new Error("Unknown doc: " + docKey);
  const resp = await fetch(doc.path, { cache: "no-cache" });
  if (!resp.ok) throw new Error("Failed to load " + doc.path + ": HTTP " + resp.status);
  const md = await resp.text();
  MD_CACHE.set(docKey, md);
  return md;
}

function buildDocNav() {
  const nav = document.getElementById("docNav");
  if (!nav) return;
  nav.replaceChildren(...SRC_KEYS.map((k) => {
    const ver = SRC_VERSIONS[k] || "";
    const btn = document.createElement("button");
    btn.className = "navbtn";
    btn.dataset.doc = k;
    btn.title = `Refs: ${k}/<section> (v${ver})`;
    btn.textContent = SRC_LABELS[k];
    return btn;
  }));
}

// ===== marked.js configuration =====
marked.setOptions({ gfm: true, breaks: false });

// ===== Comment storage (localStorage) =====
//
// Schema (current = v3):
//   webpki-comments::v3::<docKey>::<docVersion>::<eltId> → JSON array of comments
//     [{id, text, createdAt, updatedAt}]
//   webpki-loaded-sets::v1 → JSON array of {id, name, source, comments: {<docKey>: {<eltId>: [...] } }, versions: {<docKey>: <version>} }
//
// Comments are scoped to a specific document version. Switching to a different
// version of the same source surfaces a separate set of comments.

const NS = "webpki-comments::v3::";
const LOADED_SETS_KEY = "webpki-loaded-sets::v1";

function commentsKey(docKey, eltId) {
  return NS + docKey + "::" + docVersion(docKey) + "::" + eltId;
}

function getComments(docKey, eltId) {
  try {
    const raw = localStorage.getItem(commentsKey(docKey, eltId));
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch (e) { return []; }
}

function setComments(docKey, eltId, arr) {
  try {
    if (!arr || arr.length === 0) {
      localStorage.removeItem(commentsKey(docKey, eltId));
    } else {
      localStorage.setItem(commentsKey(docKey, eltId), JSON.stringify(arr));
    }
  } catch (e) { console.error(e); }
}

function addComment(docKey, eltId, text) {
  const arr = getComments(docKey, eltId);
  const c = {
    id: "c-" + Date.now().toString(36) + "-" + Math.random().toString(36).substring(2, 5),
    text: text || "",
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
  };
  arr.push(c);
  setComments(docKey, eltId, arr);
  return c;
}

function updateCommentText(docKey, eltId, commentId, newText) {
  const arr = getComments(docKey, eltId);
  const i = arr.findIndex((c) => c.id === commentId);
  if (i < 0) return;
  arr[i].text = newText;
  arr[i].updatedAt = new Date().toISOString();
  setComments(docKey, eltId, arr);
}

function updateCommentStatus(docKey, eltId, commentId, status) {
  const arr = getComments(docKey, eltId);
  const i = arr.findIndex((c) => c.id === commentId);
  if (i < 0) return;
  arr[i].status = status || undefined;
  arr[i].updatedAt = new Date().toISOString();
  setComments(docKey, eltId, arr);
}

// Returns the highest-priority status among local comments on this element,
// or null if none have a status. Priority: noncompliant > need-info > compliant > na.
const STATUS_PRIORITY = { noncompliant: 4, "need-info": 3, compliant: 2, na: 1 };
function statusForComment(c) { return c && c.status ? c.status : null; }
function ownElementStatus(docKey, eltId) {
  let best = null, bestP = 0;
  for (const c of getComments(docKey, eltId)) {
    const s = statusForComment(c);
    if (s && (STATUS_PRIORITY[s] || 0) > bestP) { best = s; bestP = STATUS_PRIORITY[s]; }
  }
  return best;
}
// Resolved status: element's own status, else section header's status, else null.
function resolvedElementStatus(docKey, eltId) {
  const own = ownElementStatus(docKey, eltId);
  if (own) return own;
  const slash = eltId.indexOf("/");
  if (slash >= 0) {
    const sec = eltId.substring(0, slash);
    return ownElementStatus(docKey, sec);
  }
  return null;
}

function deleteComment(docKey, eltId, commentId) {
  const arr = getComments(docKey, eltId);
  const idx = arr.findIndex((c) => c.id === commentId);
  if (idx < 0) return null;
  const [removed] = arr.splice(idx, 1);
  setComments(docKey, eltId, arr);
  return { comment: removed, index: idx };
}

function insertCommentAt(docKey, eltId, comment, index) {
  const arr = getComments(docKey, eltId);
  const i = (typeof index === "number" && index >= 0 && index <= arr.length) ? index : arr.length;
  arr.splice(i, 0, comment);
  setComments(docKey, eltId, arr);
}

// Returns comments for the currently configured version of `docKey`.
function allCommentsForDoc(docKey) {
  const out = {};
  const prefix = NS + docKey + "::" + docVersion(docKey) + "::";
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(prefix)) {
      try {
        const eltId = k.substring(prefix.length);
        out[eltId] = JSON.parse(localStorage.getItem(k));
      } catch (e) {}
    }
  }
  return out;
}

// Collect comments for every configured doc at its current version.
// Returns { comments: {<docKey>: {<eltId>: [...] }}, versions: {<docKey>: "<ver>"} }.
function allCommentsAllDocs() {
  const comments = {};
  const versions = {};
  for (const docKey of SRC_KEYS) {
    const c = allCommentsForDoc(docKey);
    if (Object.keys(c).length === 0) continue;
    comments[docKey] = c;
    versions[docKey] = docVersion(docKey);
  }
  return { comments, versions };
}

// ===== Undo stack =====
// In-memory only; not persisted across reloads. Capped at UNDO_MAX entries —
// pushing past that drops the oldest. Each entry is {label, undo: fn}.
const UNDO_STACK = [];
const UNDO_MAX = 20;

function pushUndo(label, undoFn) {
  UNDO_STACK.push({ label, undo: undoFn });
  if (UNDO_STACK.length > UNDO_MAX) UNDO_STACK.shift();
  refreshUndoButton();
}

function popUndo() {
  const item = UNDO_STACK.pop();
  if (!item) return;
  try { item.undo(); } catch (e) { console.error(e); }
  refreshUndoButton();
}

function refreshUndoButton() {
  const btn = document.getElementById("undoBtn");
  if (!btn) return;
  if (UNDO_STACK.length === 0) {
    btn.disabled = true;
    btn.title = "Nothing to undo";
    btn.textContent = "Undo";
  } else {
    btn.disabled = false;
    const top = UNDO_STACK[UNDO_STACK.length - 1];
    btn.title = "Undo: " + top.label + (UNDO_STACK.length > 1 ? "  (" + UNDO_STACK.length + " in stack)" : "");
    btn.textContent = "Undo (" + UNDO_STACK.length + ")";
  }
}

// ===== Loaded read-only commentary sets =====
let LOADED_SETS = [];

function loadLoadedSetsFromStorage() {
  try {
    const raw = localStorage.getItem(LOADED_SETS_KEY);
    if (!raw) return [];
    const a = JSON.parse(raw);
    return Array.isArray(a) ? a : [];
  } catch (e) { return []; }
}

function saveLoadedSetsToStorage() {
  // Default (auto-loaded) sets are re-fetched on each init, so skip persisting them.
  try {
    const toSave = LOADED_SETS.filter((s) => !s.isDefault);
    localStorage.setItem(LOADED_SETS_KEY, JSON.stringify(toSave));
  } catch (e) { console.error(e); }
}

// Reviews shipped in the repository and auto-loaded at init. Add entries
// here to surface additional read-only review sets in the viewer.
const DEFAULT_REVIEWS = [
  { name: "Claude Boulder review", url: "reviews/claude_boulder_review.json" },
];

async function loadDefaultReviews() {
  for (const def of DEFAULT_REVIEWS) {
    // Skip if the user already loaded this URL manually.
    if (LOADED_SETS.some((s) => s.source === def.url)) continue;
    try {
      const resp = await fetch(def.url, { cache: "no-cache" });
      if (!resp.ok) {
        console.warn("default review fetch failed:", def.url, resp.status);
        continue;
      }
      const payload = await resp.json();
      const norm = normalizeImportedPayload(payload);
      LOADED_SETS.push({
        id: "default-" + def.url,
        name: def.name,
        source: def.url,
        comments: norm.comments,
        versions: norm.versions,
        isDefault: true,
      });
    } catch (e) {
      console.warn("default review load failed:", def.url, e);
    }
  }
  applySideCountVars();
  renderLoadedSetsBar();
}

function normalizeImportedPayload(obj) {
  // Accept three shapes:
  //  v3 export: {version: 3, doc_versions: {<docKey>: "<ver>"}, comments: {<docKey>: {<eltId>: [comments]}}}
  //  v2 export: {version: 2, comments: {<docKey>: {<eltId>: [comments]}}}      (no version stamp)
  //  flat:      {<docKey>: {<eltId>: [comments or string]}}                       (no version stamp)
  let src = {};
  let versions = {};
  if (obj && typeof obj === "object") {
    if (obj.comments && typeof obj.comments === "object") {
      src = obj.comments;
      if (obj.doc_versions && typeof obj.doc_versions === "object") versions = obj.doc_versions;
      else if (obj.versions && typeof obj.versions === "object") versions = obj.versions;
    } else {
      src = obj;
    }
  }
  const clean = {};
  for (const docKey of Object.keys(src)) {
    const inner = src[docKey];
    if (!inner || typeof inner !== "object") continue;
    clean[docKey] = {};
    for (const eltId of Object.keys(inner)) {
      const v = inner[eltId];
      if (Array.isArray(v)) {
        clean[docKey][eltId] = v.filter((c) => c && typeof c.text === "string");
      } else if (typeof v === "string" && v.trim() !== "") {
        clean[docKey][eltId] = [{ id: "imp", text: v, createdAt: "", updatedAt: "" }];
      }
    }
  }
  return { comments: clean, versions };
}

function deriveSetName(source) {
  if (!source) return "Imported";
  let name = source;
  try { name = decodeURIComponent(name); } catch (e) {}
  name = name.replace(/[?#].*$/, "").replace(/\/$/, "");
  const slash = name.lastIndexOf("/");
  if (slash >= 0) name = name.substring(slash + 1);
  return name.replace(/\.json$/i, "") || "Imported";
}

function addLoadedSet(name, payload, source) {
  const norm = normalizeImportedPayload(payload);
  const id = "set-" + Date.now().toString(36) + "-" + Math.random().toString(36).substring(2, 5);
  LOADED_SETS.push({
    id, name, source: source || "",
    comments: norm.comments,
    versions: norm.versions,
  });
  saveLoadedSetsToStorage();
  applySideCountVars();
  renderLoadedSetsBar();
  rerouteSoft();
}

function removeLoadedSet(id) {
  const idx = LOADED_SETS.findIndex((s) => s.id === id);
  if (idx < 0) return null;
  const [removed] = LOADED_SETS.splice(idx, 1);
  saveLoadedSetsToStorage();
  applySideCountVars();
  renderLoadedSetsBar();
  rerouteSoft();
  return { set: removed, index: idx };
}

function reinsertLoadedSet(set, index) {
  const i = (typeof index === "number" && index >= 0 && index <= LOADED_SETS.length) ? index : LOADED_SETS.length;
  LOADED_SETS.splice(i, 0, set);
  saveLoadedSetsToStorage();
  applySideCountVars();
  renderLoadedSetsBar();
  rerouteSoft();
}

function applySideCountVars() {
  const n = LOADED_SETS.length + 1;
  document.body.style.setProperty("--side-count", n);
  let w = 340;
  if (n === 2) w = 280;
  else if (n === 3) w = 240;
  else if (n >= 4) w = 200;
  document.body.style.setProperty("--side-width", w + "px");
}

function renderLoadedSetsBar() {
  const bar = document.getElementById("loadedSetsBar");
  if (!bar) return;
  if (LOADED_SETS.length === 0) {
    bar.style.display = "none";
    bar.replaceChildren();
    return;
  }
  bar.style.display = "flex";
  const label = document.createElement("span");
  label.className = "label";
  label.textContent = "Loaded:";
  const children = [label];
  for (const s of LOADED_SETS) {
    let count = 0;
    const mismatches = [];
    const versions = s.versions || {};
    for (const dk of Object.keys(s.comments)) {
      for (const eid of Object.keys(s.comments[dk])) count += s.comments[dk][eid].length;
      const setVer = versions[dk];
      const curVer = docVersion(dk);
      if (setVer && curVer && setVer !== curVer) {
        mismatches.push(dk + " v" + setVer + " ≠ v" + curVer);
      }
    }
    let title = count + " comment(s)" + (s.source ? " from " + s.source : "");
    if (mismatches.length) title += "\nVersion mismatch: " + mismatches.join("; ");
    const chip = document.createElement("span");
    chip.className = "loaded-set-chip" + (mismatches.length ? " mismatch" : "");
    chip.title = title;
    chip.append(s.name);
    if (mismatches.length) {
      const v = document.createElement("span");
      v.className = "vmark";
      v.setAttribute("aria-hidden", "true");
      v.textContent = " ⚠";
      chip.append(v);
    }
    const rm = document.createElement("button");
    rm.className = "remove-btn";
    rm.dataset.removeSet = s.id;
    rm.textContent = "×";
    chip.append(" ", rm);
    children.push(chip);
  }
  bar.replaceChildren(...children);
}

// ===== Element-ID computation (must match Python parser) =====
//
// Walking rules:
//   - On heading: compute section id from text; reset p/li/tr counters.
//   - On <p>: bump p.
//   - On <li>: bump li (we visit every <li> including nested).
//   - On <tr> in <tbody>: bump tr.
//
// Section id from heading text:
//   numeric prefix "N(.N)*" stripped to that;  else slug of the whole heading.
//   collisions within a doc get "-2", "-3" suffix.

function computeSectionFromHeading(text, seenMap) {
  const t = text.trim();
  const m = t.match(/^(\d+(?:\.\d+)*)\.?(?:\s|$)/);
  let sid;
  if (m) sid = m[1];
  else sid = slugify(t);
  const n = (seenMap[sid] || 0) + 1;
  seenMap[sid] = n;
  if (n > 1) sid = sid + "-" + n;
  return sid;
}

function slugify(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "").substring(0, 48) || "section";
}

// ===== Document rendering =====
//
// Strategy: each top-level section (per heading) becomes its own .section-row
// grid container. Within the grid, every commentable element (heading,
// paragraph, top-level list item, table) produces 3+N cells in a row:
// [ref] [content] [status] [comments-local] [comments-loaded-set ...]. The
// row's height is max(content, comments), so tall comments stretch the row
// and push the next paragraph down.
//   1. Split markdown into chunks at each heading.
//   2. For each chunk: render with marked into a temp container, assign
//      eltIds in DFS order matching the manifest, then walk top-level
//      children to emit per-element grid rows.

function splitMarkdownAtHeadings(md) {
  // Returns [{heading: "...", level: N|null, body: "..."}]; first chunk has no heading.
  const lines = md.split("\n");
  const chunks = [];
  let cur = { heading: null, level: null, body: [] };
  let inCode = false;
  let inFront = false;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    // Skip YAML frontmatter at top
    if (i === 0 && line.trim() === "---") { inFront = true; cur.body.push(line); continue; }
    if (inFront) {
      cur.body.push(line);
      if (line.trim() === "---") inFront = false;
      continue;
    }
    const s = line.trimStart();
    if (s.startsWith("```") || s.startsWith("~~~")) inCode = !inCode;
    if (!inCode) {
      const m = line.match(/^(#{1,6})\s+(.+?)\s*$/);
      if (m) {
        chunks.push(cur);
        cur = { heading: m[2].trim(), level: m[1].length, body: [line] };
        continue;
      }
    }
    cur.body.push(line);
  }
  chunks.push(cur);
  return chunks.map((c) => ({ heading: c.heading, level: c.level, body: c.body.join("\n") }));
}

async function renderDocPage(docKey) {
  const doc = SRC_DATA[docKey];
  const page = document.createElement("div");
  page.className = "doc-page";
  page.dataset.docKey = docKey;
  page.innerHTML =
    '<h1 class="doc-title"><span class="doc-name"></span> <span class="doc-version"></span></h1>' +
    '<div class="doc-meta">Rendered from <code class="filename"></code>' +
    ' · <span class="counts"></span> · ' +
    'Refs look like <code class="ref-pat"></code> or <code class="ref-pat-p"></code> ' +
    '(e.g. in code: <code class="ref-pat-code"></code>).</div>';
  page.querySelector(".doc-name").textContent = SRC_LABELS[docKey];
  page.querySelector(".doc-version").textContent = "v" + (doc.version || "");
  page.querySelector(".filename").textContent = doc.filename;
  page.querySelector(".counts").textContent =
    (doc.section_count || 0) + " sections · " + (doc.elt_count || 0) + " commentable elements";
  page.querySelector(".ref-pat").textContent = docKey + "/<section>";
  page.querySelector(".ref-pat-p").textContent = docKey + "/<section>/p3";
  page.querySelector(".ref-pat-code").textContent = "// webpki:" + docKey + "/<section>/p3";

  // Build TOC from headings while we render.
  const tocWrap = document.createElement("details");
  tocWrap.className = "toc-wrap";
  tocWrap.open = false;
  tocWrap.innerHTML = '<summary>Table of contents</summary><div class="toc-grid"></div>';
  page.appendChild(tocWrap);
  const tocBox = tocWrap.querySelector(".toc-grid");

  const md = await getMarkdown(docKey);
  const chunks = splitMarkdownAtHeadings(md);
  const seenSections = {};

  for (const chunk of chunks) {
    // Skip empty preamble (no heading and no body) — common when doc starts with H1.
    if (!chunk.heading && !chunk.body.trim()) continue;

    // Compute section id for this chunk.
    const sectionId = chunk.heading
      ? computeSectionFromHeading(chunk.heading, seenSections)
      : "_preamble";

    // Render the chunk's markdown into a temp container, assign eltIds in
    // DFS order (so they match the manifest), then split the top-level
    // children into per-element rows.
    const tmp = document.createElement("div");
    tmp.innerHTML = marked.parse(chunk.body || "");
    annotateElementsWithIds(tmp, sectionId, docKey);

    // The section's heading (h1..h6) is the first child here when present;
    // tag it with the section anchor and add it to the TOC.
    const h = tmp.querySelector("h1, h2, h3, h4, h5, h6");
    if (h) {
      h.id = "sec-" + sectionId.replace(/\./g, "-").replace(/\//g, "_");
      h.dataset.eltId = sectionId;
      h.dataset.eltKind = "section";
      h.appendChild(makeEltHandle(docKey, sectionId, "section"));
      const link = document.createElement("a");
      link.href = "#" + docKey + "/" + sectionId;
      link.textContent = chunk.heading;
      link.dataset.lvl = chunk.level || 1;
      tocBox.appendChild(link);
    }

    const row = document.createElement("div");
    row.className = "section-row";
    row.dataset.sectionId = sectionId;

    // For each top-level child of `tmp`, emit one or more grid rows.
    for (const child of Array.from(tmp.children)) {
      const tag = child.tagName.toLowerCase();
      if (tag === "ul" || tag === "ol") {
        appendListAsRows(row, child, docKey);
      } else {
        const eltId = child.dataset.eltId || null;
        // Tables: every <tr> is commentable but the table itself isn't, so
        // the row's primary eltId is null and the comments cell aggregates
        // comments for every <tr> inside.
        const extraIds = collectDescendantEltIds(child, eltId);
        appendGridRow(row, {
          docKey, eltId, contentEl: child,
          commentEltIds: eltId ? [eltId, ...extraIds] : extraIds,
        });
      }
    }

    page.appendChild(row);
  }

  return page;
}

// Split a <ul>/<ol> into one grid row per direct <li>. Each row's content
// is a single-item list of the same kind (preserving start= for ordered
// lists) so the marker and indentation render naturally. Nested lists stay
// inline within their parent <li>'s row, and the nested <li> eltIds are
// aggregated into the parent row's comments cell.
function appendListAsRows(row, listEl, docKey) {
  const tag = listEl.tagName.toLowerCase();
  const startAttr = listEl.getAttribute("start");
  const baseStart = parseInt(startAttr || "1", 10);
  const items = Array.from(listEl.children).filter(
    (c) => c.tagName.toLowerCase() === "li"
  );
  items.forEach((li, idx) => {
    const eltId = li.dataset.eltId || null;
    const wrap = document.createElement(tag);
    if (tag === "ol") wrap.setAttribute("start", String(baseStart + idx));
    wrap.appendChild(li);
    const extraIds = collectDescendantEltIds(wrap, eltId);
    appendGridRow(row, {
      docKey, eltId, contentEl: wrap,
      commentEltIds: eltId ? [eltId, ...extraIds] : extraIds,
    });
  });
}

// Walk content for descendant elements carrying data-elt-id and return
// their ids (in document order). Skips elt-handle spans and the primary
// element itself.
function collectDescendantEltIds(contentEl, primaryEltId) {
  const ids = [];
  contentEl.querySelectorAll("[data-elt-id]").forEach((el) => {
    if (el.classList.contains("elt-handle")) return;
    const id = el.dataset.eltId;
    if (!id || id === primaryEltId) return;
    ids.push(id);
  });
  return ids;
}

// Append one grid row (3+N cells: ref, content, status, plus one comments
// cell per source) for the given element.
//   eltId         — primary commentable id (drives ref, status, "add comment"
//                   click target). May be null for non-commentable wrappers
//                   (a <table> whose tr's are the commentable units).
//   commentEltIds — list of eltIds whose comments aggregate into this row's
//                   comments cells (defaults to [eltId]). Lets a single row
//                   surface comments for several nested elements.
function appendGridRow(row, { docKey, eltId, contentEl, commentEltIds }) {
  const commentIds = commentEltIds || (eltId ? [eltId] : []);

  // Ref cell
  const refCell = document.createElement("div");
  refCell.className = "elt-ref";
  if (eltId) {
    const isSection = !eltId.includes("/");
    if (isSection) refCell.classList.add("section-ref");
    const a = document.createElement("a");
    a.href = "#" + docKey + "/" + eltId;
    a.textContent = formatRefSymbol(eltId);
    a.title = docKey + "/" + eltId;
    refCell.appendChild(a);
  }
  row.appendChild(refCell);

  // Content cell
  const contentCell = document.createElement("div");
  contentCell.className = "elt-content";
  contentCell.appendChild(contentEl);
  row.appendChild(contentCell);

  // Status cell
  const statusCell = document.createElement("div");
  statusCell.className = "elt-status";
  if (eltId) statusCell.dataset.eltId = eltId;
  paintStatusCell(statusCell, docKey, eltId);
  row.appendChild(statusCell);

  // Comments cells — one per source (local, then each loaded set).
  row.appendChild(makeCommentsCell({ kind: "local", docKey, eltId, commentIds }));
  for (const set of LOADED_SETS) {
    row.appendChild(makeCommentsCell({ kind: "loaded", docKey, eltId, commentIds, set }));
  }
}

function makeCommentsCell({ kind, docKey, eltId, commentIds, set }) {
  const cell = document.createElement("div");
  cell.className = "elt-comments";
  cell.dataset.docKey = docKey;
  if (eltId) cell.dataset.eltId = eltId;
  if (commentIds && commentIds.length) {
    cell.dataset.commentIds = commentIds.join(",");
  }
  if (kind === "local") {
    cell.dataset.colKind = "local";
  } else {
    cell.dataset.colKind = "loaded";
    cell.dataset.setId = set.id;
  }
  renderCommentsCell(cell);
  return cell;
}

function renderCommentsCell(cell) {
  const docKey = cell.dataset.docKey;
  const idsAttr = cell.dataset.commentIds || cell.dataset.eltId || "";
  const ids = idsAttr ? idsAttr.split(",") : [];
  cell.replaceChildren();
  if (ids.length === 0) return;
  const isLocal = cell.dataset.colKind === "local";
  let docMap;
  if (isLocal) {
    docMap = allCommentsForDoc(docKey);
  } else {
    const set = LOADED_SETS.find((s) => s.id === cell.dataset.setId);
    docMap = set ? (set.comments[docKey] || {}) : {};
  }
  for (const eid of ids) {
    const comments = docMap[eid] || [];
    for (const c of comments) {
      cell.appendChild(renderCommentCard({
        docKey, eltId: eid, comment: c, readonly: !isLocal,
      }));
    }
  }
}

function paintStatusCell(cell, docKey, eltId) {
  // Strip any previous status class.
  cell.classList.remove("compliant", "need-info", "noncompliant", "na", "unreviewed");
  if (!eltId) return;
  // resolvedElementStatus already falls back to the section's own status.
  const s = resolvedElementStatus(docKey, eltId) || "unreviewed";
  cell.classList.add(s);
}

function annotateElementsWithIds(content, sectionId, docKey) {
  // Must match Python parser counting rules:
  //   p  → top-level paragraphs only (skip <p> inside <li>, <blockquote>, <td>, <th>)
  //   li → every <li>, nested or not
  //   tr → every <tr> inside <tbody>
  let pCount = 0, liCount = 0, trCount = 0;
  const walker = document.createTreeWalker(content, NodeFilter.SHOW_ELEMENT);
  let node;
  while ((node = walker.nextNode())) {
    const tag = node.tagName.toLowerCase();
    if (tag === "p") {
      // Skip if any ancestor is a list item / blockquote / table cell.
      let skip = false;
      let p = node.parentElement;
      while (p && p !== content) {
        const t = p.tagName.toLowerCase();
        if (t === "li" || t === "blockquote" || t === "td" || t === "th") {
          skip = true; break;
        }
        p = p.parentElement;
      }
      if (skip) continue;
      pCount++;
      const eid = sectionId + "/p" + pCount;
      node.dataset.eltId = eid;
      node.dataset.eltKind = "p";
      node.appendChild(makeEltHandle(docKey, eid, "p"));
    } else if (tag === "li") {
      liCount++;
      const eid = sectionId + "/li" + liCount;
      node.dataset.eltId = eid;
      node.dataset.eltKind = "li";
      node.appendChild(makeEltHandle(docKey, eid, "li"));
    } else if (tag === "tr" && node.closest("tbody")) {
      trCount++;
      const eid = sectionId + "/tr" + trCount;
      node.dataset.eltId = eid;
      node.dataset.eltKind = "tr";
      const lastTd = node.lastElementChild;
      if (lastTd) {
        lastTd.classList.add("has-row-handle");
        const handle = makeEltHandle(docKey, eid, "tr");
        handle.classList.add("row-handle");
        lastTd.appendChild(handle);
      }
    }
  }
}

function commentCount(docKey, eltId) {
  let total = getComments(docKey, eltId).length;
  for (const s of LOADED_SETS) {
    const dk = s.comments[docKey];
    if (dk && dk[eltId]) total += dk[eltId].length;
  }
  return total;
}

function makeEltHandle(docKey, eltId, kind) {
  const a = document.createElement("span");
  a.className = "elt-handle";
  a.dataset.docKey = docKey;
  a.dataset.eltId = eltId;
  a.dataset.kind = kind;
  refreshHandle(a);
  return a;
}

function refreshHandle(a) {
  if (!a) return;
  const n = commentCount(a.dataset.docKey, a.dataset.eltId);
  const ref = formatRefSymbol(a.dataset.eltId);
  if (n > 0) {
    a.classList.add("has-comments");
    a.innerHTML = '<span class="count"></span> <span class="ref"></span>';
    a.querySelector(".count").textContent = n;
    a.querySelector(".ref").textContent = ref;
    a.title = n + " comment(s) on " + a.dataset.docKey + "/" + a.dataset.eltId;
  } else {
    a.classList.remove("has-comments");
    a.replaceChildren("+ " + ref);
    a.title = "Add comment on " + a.dataset.docKey + "/" + a.dataset.eltId;
  }
}

// Symbolic ref including section.
//   1.2.1            → "§1.2.1"
//   1.2.1/p3         → "§1.2.1 ¶3"
//   1.2.1/li5        → "§1.2.1 •5"
//   1.2.1/tr2        → "§1.2.1 □2"
function formatRefSymbol(eltId) {
  const slash = eltId.indexOf("/");
  if (slash < 0) return "§" + eltId;
  const section = eltId.substring(0, slash);
  const rest = eltId.substring(slash + 1);
  const m = rest.match(/^(p|li|tr)(\d+)$/);
  if (!m) return "§" + section + " " + rest;
  const sym = m[1] === "p" ? "¶" : (m[1] === "li" ? "•" : "□");
  return "§" + section + " " + sym + m[2];
}

function refreshAllHandlesFor(docKey, eltId) {
  document.querySelectorAll('.elt-handle[data-doc-key="' + cssEscape(docKey) + '"][data-elt-id="' + cssEscape(eltId) + '"]').forEach(refreshHandle);
}

function cssEscape(s) {
  return String(s).replace(/(["\\#.:/])/g, "\\$&");
}

// ===== Status painting =====
// The per-element layout means there is no longer a status "gutter"
// spanning a whole section — each row's .elt-status cell paints its own
// status. Repaint every cell on a status change for a given (doc, elt).
function repaintStatusFor(docKey, eltId) {
  document
    .querySelectorAll(
      '.elt-status[data-elt-id="' + cssEscape(eltId) + '"]'
    )
    .forEach((cell) => paintStatusCell(cell, docKey, eltId));
  // The section's status also feeds the resolved status of every element
  // under it; if a section heading's status changed, repaint the whole
  // section's cells too.
  if (!eltId.includes("/")) {
    document
      .querySelectorAll(
        '.section-row[data-section-id="' + cssEscape(eltId) + '"] .elt-status'
      )
      .forEach((cell) => {
        const id = cell.dataset.eltId;
        if (id) paintStatusCell(cell, docKey, id);
      });
  }
}

// CSS grid handles vertical alignment of comments-vs-content now; no JS
// positioning is required. These stubs remain so the comment add/delete
// handlers and the resize listener can keep calling them without a flag-day
// rewrite of every call site.
function scheduleAlign() {}

function compareEltIds(a, b) {
  // section itself sorts first; then by kind p < li < tr; then by ordinal.
  function key(s) {
    const slash = s.indexOf("/");
    if (slash < 0) return [0, 0];
    const rest = s.substring(slash + 1);
    const m = rest.match(/^(p|li|tr)(\d+)$/);
    if (!m) return [3, 0];
    const ord = parseInt(m[2], 10);
    const kindOrder = m[1] === "p" ? 1 : (m[1] === "li" ? 2 : 3);
    return [kindOrder, ord];
  }
  const ka = key(a), kb = key(b);
  return ka[0] - kb[0] || ka[1] - kb[1];
}

const STATUS_OPTIONS = [
  { value: "compliant",    label: "Compliant" },
  { value: "need-info",    label: "Need info" },
  { value: "noncompliant", label: "Noncompliant" },
  { value: "na",           label: "N/A" },
];

function makeReviewButtons(currentStatus) {
  const row = document.createElement("div");
  row.className = "review-status-row";
  row.setAttribute("role", "group");
  row.setAttribute("aria-label", "Review status");
  for (const opt of STATUS_OPTIONS) {
    const btn = document.createElement("button");
    btn.className = "review-btn " + opt.value + (currentStatus === opt.value ? " active" : "");
    btn.dataset.reviewValue = opt.value;
    btn.title = "Toggle " + opt.label;
    btn.textContent = opt.label;
    row.appendChild(btn);
  }
  return row;
}

function renderCommentCard({ docKey, eltId, comment, readonly }) {
  const card = document.createElement("div");
  card.className = "comment-card" + (readonly ? " readonly" : "");
  card.dataset.docKey = docKey;
  card.dataset.eltId = eltId;
  card.dataset.commentId = comment.id;
  card.dataset.reviewStatus = comment.status || "";

  const isSection = !eltId.includes("/");
  const refLabel = formatRefSymbol(eltId);

  const headRow = document.createElement("div");
  const chip = document.createElement("span");
  chip.className = "ref-chip" + (isSection ? " section-ref" : "");
  chip.dataset.jumpElt = eltId;
  chip.title = "Jump to element";
  chip.textContent = refLabel;
  headRow.appendChild(chip);
  if (!readonly) {
    const del = document.createElement("button");
    del.className = "delete-btn";
    del.title = "Delete this comment";
    del.textContent = "×";
    headRow.appendChild(del);
  }
  card.appendChild(headRow);

  if (readonly) {
    const rendered = document.createElement("div");
    rendered.className = "rendered";
    renderCommentMarkdownInto(rendered, comment.text);
    card.appendChild(rendered);
    if (comment.status) {
      const opt = STATUS_OPTIONS.find((o) => o.value === comment.status);
      const pill = document.createElement("div");
      pill.className = "readonly-status " + comment.status;
      pill.textContent = opt ? opt.label : comment.status;
      card.appendChild(pill);
    }
  } else {
    const ta = document.createElement("textarea");
    ta.className = "cmt-text";
    ta.placeholder = 'Markdown. Refs: [label](#doc/sec/p3), [[doc/sec/p3]], or "CABF BR §3.2 ¶1"';
    ta.value = comment.text || "";
    card.appendChild(ta);

    const rendered = document.createElement("div");
    rendered.className = "rendered";
    renderCommentMarkdownInto(rendered, ta.value);
    card.appendChild(rendered);

    card.appendChild(makeReviewButtons(comment.status));

    const meta = document.createElement("div");
    meta.className = "meta";
    const saveStatus = document.createElement("span");
    saveStatus.className = "save-status";
    meta.appendChild(saveStatus);
    const when = document.createElement("span");
    when.textContent = comment.updatedAt ? new Date(comment.updatedAt).toLocaleString() : "";
    meta.appendChild(when);
    card.appendChild(meta);
  }
  return card;
}

// ===== Markdown rendering + cross-reference linkification =====

function renderCommentMarkdownInto(target, md) {
  if (!md) { target.replaceChildren(); return; }
  let html = marked.parseInline(md.replace(/\n\n+/g, "<br>"));
  // marked.parseInline doesn't do block-level; for short notes that's fine,
  // but we also want lists/paras. Use full parse if there are blank lines.
  if (md.indexOf("\n\n") >= 0 || md.indexOf("\n- ") >= 0 || md.indexOf("\n* ") >= 0) {
    html = marked.parse(md);
  }
  target.innerHTML = html;
  linkifyRefs(target);
}

// Patterns we recognise (in priority order):
//  1. [[<docKey>#<section>[/<elt>]]]    — wiki-style explicit ref
//  2. <DocLabel> §<section>[ ¶<n>|/<elt>]    — natural form
//  3. <docKey>#<section>[/<elt>]        — bare ref
function buildXrefPatterns() {
  const labels = [];
  for (const k of SRC_KEYS) {
    labels.push({ name: SRC_LABELS[k], key: k });
  }
  // Sort by name length desc so longer names match first ("LE CP/CPS" before "LE")
  labels.sort((a, b) => b.name.length - a.name.length);
  const escName = (s) => s.replace(/[.*+?^${}()|[\]\\\/]/g, "\\$&");
  const labelAlt = labels.map((l) => escName(l.name)).join("|");
  const docKeyAlt = SRC_KEYS.map(escName).join("|");
  return [
    { // [[key/section[/elt]]] (wiki style)
      re: /\[\[\s*(\w+)\/([^\s\]\/]+)(?:\/([a-z]+\d+))?\s*\]\]/g,
      build: (m) => ({
        href: "#" + m[1] + "/" + m[2] + (m[3] ? "/" + m[3] : ""),
        text: m[1] + "/" + m[2] + (m[3] ? "/" + m[3] : ""),
        docKey: m[1], eltId: m[2] + (m[3] ? "/" + m[3] : ""),
      }),
    },
    { // Natural: "CABF BR §7.1.2.10.2 ¶3" / " /li3" / " /tr2"
      re: new RegExp("\\b(" + labelAlt + ")\\s+§(\\d+(?:\\.\\d+)*)" +
                     "(?:\\s+¶(\\d+)|/(p\\d+|li\\d+|tr\\d+))?", "g"),
      build: (m) => {
        const label = labels.find((l) => l.name === m[1]);
        const docKey = label ? label.key : m[1];
        const sec = m[2];
        const elt = m[3] ? "p" + m[3] : (m[4] || "");
        const eid = sec + (elt ? "/" + elt : "");
        return { href: "#" + docKey + "/" + eid, text: m[0], docKey, eltId: eid };
      },
    },
    { // bare webpki:key/section[/elt] — for tooling-style refs
      re: new RegExp("\\bwebpki:(" + docKeyAlt + ")/([\\w.\\-]+)(?:/([a-z]+\\d+))?", "g"),
      build: (m) => {
        const eid = m[2] + (m[3] ? "/" + m[3] : "");
        return { href: "#" + m[1] + "/" + eid, text: m[0], docKey: m[1], eltId: eid };
      },
    },
  ];
}

let _XREF_PATTERNS = null;
function xrefPatterns() {
  if (!_XREF_PATTERNS) _XREF_PATTERNS = buildXrefPatterns();
  return _XREF_PATTERNS;
}

function isValidRef(docKey, eltId) {
  if (!SRC_DATA[docKey]) return false;
  // section-only: check sections list
  const flat = SRC_DATA[docKey].section_ids || [];
  if (flat.indexOf(eltId) >= 0) return true;
  // check element manifest
  const elts = SRC_DATA[docKey].elt_ids || [];
  return elts.indexOf(eltId) >= 0;
}

function linkifyRefs(root) {
  const patterns = xrefPatterns();
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode: (n) => {
      let p = n.parentNode;
      while (p && p !== root) {
        if (p.tagName === "A" || p.tagName === "CODE" || p.tagName === "PRE") return NodeFilter.FILTER_REJECT;
        p = p.parentNode;
      }
      return NodeFilter.FILTER_ACCEPT;
    },
  });
  const nodes = [];
  let cur;
  while ((cur = walker.nextNode())) nodes.push(cur);
  for (const tn of nodes) {
    const text = tn.nodeValue;
    if (!text || text.length < 3) continue;
    const matches = [];
    for (let i = 0; i < patterns.length; i++) {
      const p = patterns[i];
      const re = new RegExp(p.re.source, p.re.flags);
      let m;
      while ((m = re.exec(text)) !== null) {
        matches.push({ index: m.index, len: m[0].length, link: p.build(m), order: i });
      }
    }
    if (matches.length === 0) continue;
    matches.sort((a, b) => a.index - b.index || a.order - b.order);
    const kept = [];
    let lastEnd = -1;
    for (const m of matches) {
      if (m.index >= lastEnd) { kept.push(m); lastEnd = m.index + m.len; }
    }
    const frag = document.createDocumentFragment();
    let pos = 0;
    for (const m of kept) {
      if (m.index > pos) frag.appendChild(document.createTextNode(text.substring(pos, m.index)));
      const a = document.createElement("a");
      a.className = "xref";
      a.href = m.link.href;
      a.textContent = m.link.text;
      if (!isValidRef(m.link.docKey, m.link.eltId)) {
        a.classList.add("broken");
        a.title = "Reference not found in build manifest";
      }
      frag.appendChild(a);
      pos = m.index + m.len;
    }
    if (pos < text.length) frag.appendChild(document.createTextNode(text.substring(pos)));
    tn.parentNode.replaceChild(frag, tn);
  }
}

// ===== Manifest page =====
function renderManifestPage() {
  const page = document.createElement("div");
  page.innerHTML =
    '<h1 class="doc-title">ID Manifest</h1>' +
    '<div class="doc-meta"><span class="counts"></span> commentable elements across ' +
    '<span class="docs-count"></span> documents. ' +
    'Use any <code>ref</code> below as a stable cross-reference in code comments or notes — e.g. ' +
    '<code>// webpki:cabf_br/7.1.2.10.2/p3</code>.</div>';
  page.querySelector(".counts").textContent = MANIFEST.length;
  page.querySelector(".docs-count").textContent = SRC_KEYS.length;
  const sw = document.createElement("div");
  sw.innerHTML = '<input id="manifest-filter" type="search" placeholder="Filter… (ref, title, snippet)" style="width:340px;padding:4px 8px;border:1px solid var(--border);border-radius:4px;margin-bottom:8px;">';
  page.appendChild(sw);
  const tbl = document.createElement("table");
  tbl.className = "manifest-table";
  tbl.innerHTML = '<thead><tr><th>Ref</th><th>Doc</th><th>Section</th><th>Kind</th><th>Snippet</th></tr></thead><tbody></tbody>';
  page.appendChild(tbl);
  const tb = tbl.querySelector("tbody");
  for (const r of MANIFEST) {
    const tr = document.createElement("tr");
    tr.dataset.searchKey = (r.ref + " " + r.title + " " + r.snippet).toLowerCase();
    const refTd = document.createElement("td");
    refTd.className = "ref";
    const a = document.createElement("a");
    a.href = "#" + r.doc + "/" + r.section + (r.kind === "section" ? "" : "/" + r.kind + r.ord);
    a.textContent = r.ref;
    refTd.appendChild(a);
    const docTd = document.createElement("td");
    docTd.textContent = SRC_LABELS[r.doc] || r.doc;
    const secTd = document.createElement("td");
    secTd.textContent = r.section + (r.title && r.title !== r.section ? " " + r.title : "");
    const kindTd = document.createElement("td");
    kindTd.textContent = (r.kind === "section" ? "§" : r.kind) + (r.kind !== "section" ? r.ord : "");
    const snipTd = document.createElement("td");
    snipTd.textContent = r.snippet || "";
    tr.append(refTd, docTd, secTd, kindTd, snipTd);
    tb.appendChild(tr);
  }
  // wire up filter
  setTimeout(() => {
    const inp = page.querySelector("#manifest-filter");
    if (!inp) return;
    inp.addEventListener("input", () => {
      const q = inp.value.toLowerCase().trim();
      tb.querySelectorAll("tr").forEach((row) => {
        row.style.display = (!q || row.dataset.searchKey.indexOf(q) >= 0) ? "" : "none";
      });
    });
  }, 0);
  return page;
}

// ===== Routing =====
// Hashes:
//   #manifest                → manifest page
//   #<docKey>                → doc page top
//   #<docKey>#<sectionId>    → doc page, scroll to section
//   #<docKey>#<sectionId>/<eltKind><n>  → doc page, scroll to element

async function navigateHash() {
  const raw = window.location.hash.replace(/^#/, "");
  const fallback = SRC_KEYS[0] || "cabf_br";
  if (!raw) { return renderRoute(fallback, null); }
  if (raw === "manifest") { return renderRoute("manifest", null); }
  // Doc page with optional element ref. Split on first '/'.
  const slash = raw.indexOf("/");
  let docKey, eltId;
  if (slash < 0) {
    docKey = raw;
    eltId = null;
  } else {
    docKey = raw.substring(0, slash);
    eltId = raw.substring(slash + 1);
  }
  if (!SRC_DATA[docKey]) { return renderRoute(fallback, null); }
  return renderRoute(docKey, eltId);
}

async function renderRoute(docKey, eltId) {
  document.querySelectorAll(".navbtn").forEach((b) => b.classList.remove("active"));
  const main = document.getElementById("content");
  main.replaceChildren();
  if (docKey === "manifest") {
    document.querySelector('.navbtn[data-route="#manifest"]')?.classList.add("active");
    main.appendChild(renderManifestPage());
    return;
  }
  const btn = document.querySelector('.navbtn[data-doc="' + cssEscape(docKey) + '"]');
  if (btn) btn.classList.add("active");
  const loading = document.createElement("div");
  loading.className = "doc-loading";
  loading.textContent = "Loading " + (SRC_LABELS[docKey] || docKey) + "…";
  main.replaceChildren(loading);
  let page;
  try {
    page = await renderDocPage(docKey);
  } catch (err) {
    const errEl = document.createElement("div");
    errEl.className = "doc-error";
    errEl.append("Failed to load ");
    const codeEl = document.createElement("code");
    codeEl.textContent = SRC_DATA[docKey] ? SRC_DATA[docKey].path : docKey;
    errEl.append(codeEl, ": " + (err.message || String(err)));
    main.replaceChildren(errEl);
    return;
  }
  main.replaceChildren(page);
  scheduleAlign();
  // Scroll/flash target
  if (eltId) {
    setTimeout(() => {
      const target = document.querySelector('.doc-page[data-doc-key="' + cssEscape(docKey) + '"] [data-elt-id="' + cssEscape(eltId) + '"]');
      if (target) {
        target.scrollIntoView({ behavior: "smooth", block: "center" });
        target.classList.add("flash", "active-target");
        setTimeout(() => target.classList.remove("flash", "active-target"), 2400);
      }
    }, 60);
  } else {
    window.scrollTo(0, 0);
  }
}

function rerouteSoft() {
  // Re-render the current view (e.g., after loading a notes set so the new column appears).
  navigateHash();
}

window.addEventListener("hashchange", navigateHash);

// ===== Event delegation =====

// Handle ref-chip clicks on mousedown — otherwise clicking the chip from
// inside a focused (and possibly empty) comment textarea would blur the
// textarea, run the focusout cleanup, and remove the chip before the click
// event fires. preventDefault keeps focus where it is until navigation
// re-renders the page.
document.addEventListener("mousedown", (e) => {
  const jump = e.target.closest("[data-jump-elt]");
  if (jump) {
    e.preventDefault();
    const eid = jump.dataset.jumpElt;
    const card = jump.closest(".comment-card");
    const docKey = card?.dataset.docKey;
    if (docKey) window.location.hash = "#" + docKey + "/" + eid;
    return;
  }
  // Review status buttons — handle on mousedown w/ preventDefault so the
  // textarea keeps focus and the empty-card cleanup doesn't fire (an empty
  // comment with a status set must be kept).
  const reviewBtn = e.target.closest(".review-btn[data-review-value]");
  if (reviewBtn) {
    e.preventDefault();
    const card = reviewBtn.closest(".comment-card");
    if (!card) return;
    const newValue = reviewBtn.dataset.reviewValue;
    const cur = card.dataset.reviewStatus || "";
    const next = cur === newValue ? "" : newValue;
    const docKey = card.dataset.docKey;
    const eltId = card.dataset.eltId;
    const cid = card.dataset.commentId;
    updateCommentStatus(docKey, eltId, cid, next);
    card.dataset.reviewStatus = next;
    card.querySelectorAll(".review-btn").forEach((b) => {
      b.classList.toggle("active", b.dataset.reviewValue === next);
    });
    repaintStatusFor(docKey, eltId);
    refreshAllHandlesFor(docKey, eltId);
    return;
  }
});

document.addEventListener("click", (e) => {
  // Nav button
  const navbtn = e.target.closest(".navbtn");
  if (navbtn) {
    if (navbtn.dataset.route) {
      window.location.hash = navbtn.dataset.route;
    } else if (navbtn.dataset.doc) {
      window.location.hash = "#" + navbtn.dataset.doc;
    }
    return;
  }

  // Remove loaded set
  const rm = e.target.closest("[data-remove-set]");
  if (rm) {
    const id = rm.dataset.removeSet;
    const snap = removeLoadedSet(id);
    if (snap) {
      pushUndo("Remove column “" + snap.set.name + "”",
               () => reinsertLoadedSet(snap.set, snap.index));
    }
    return;
  }

  // Elt handle → add or focus comments
  const handle = e.target.closest(".elt-handle");
  if (handle) {
    e.preventDefault();
    onHandleClicked(handle);
    return;
  }

  // Jump from comment ref-chip to its element
  const jump = e.target.closest("[data-jump-elt]");
  if (jump) {
    const eid = jump.dataset.jumpElt;
    const card = jump.closest(".comment-card");
    const docKey = card?.dataset.docKey;
    if (docKey) window.location.hash = "#" + docKey + "/" + eid;
    return;
  }

  // Comment delete
  const del = e.target.closest(".comment-card .delete-btn");
  if (del) {
    const card = del.closest(".comment-card");
    if (!card) return;
    const docKey = card.dataset.docKey;
    const eltId = card.dataset.eltId;
    const cid = card.dataset.commentId;
    const snap = deleteComment(docKey, eltId, cid);
    if (!snap) return;
    pushUndo("Delete comment", () => {
      insertCommentAt(docKey, eltId, snap.comment, snap.index);
      const cell = findLocalCommentsCell(docKey, eltId);
      if (cell) renderCommentsCell(cell);
      repaintStatusFor(docKey, eltId);
      refreshAllHandlesFor(docKey, eltId);
    });
    // Re-render just the cell that contained this card.
    const cell = card.closest(".elt-comments");
    if (cell) renderCommentsCell(cell);
    repaintStatusFor(docKey, eltId);
    refreshAllHandlesFor(docKey, eltId);
    return;
  }
});

function findLocalCommentsCell(docKey, eltId) {
  // Exact match (primary eltId on the cell).
  const exact = document.querySelector(
    '.elt-comments[data-col-kind="local"][data-doc-key="' + cssEscape(docKey) +
    '"][data-elt-id="' + cssEscape(eltId) + '"]'
  );
  if (exact) return exact;
  // Aggregated match: a cell listing eltId among its comment-ids (e.g., a
  // table row's cell that gathers all its <tr> ids).
  const cells = document.querySelectorAll(
    '.elt-comments[data-col-kind="local"][data-doc-key="' + cssEscape(docKey) + '"][data-comment-ids]'
  );
  for (const cell of cells) {
    const ids = (cell.dataset.commentIds || "").split(",");
    if (ids.includes(eltId)) return cell;
  }
  return null;
}

function onHandleClicked(handle) {
  const docKey = handle.dataset.docKey;
  const eltId = handle.dataset.eltId;
  if (!docKey || !eltId) return;
  const cell = findLocalCommentsCell(docKey, eltId);
  if (!cell) return;
  // If this elt already has a local comment in the cell, focus the last one.
  const existing = cell.querySelectorAll(
    '.comment-card[data-elt-id="' + cssEscape(eltId) + '"]'
  );
  if (existing.length > 0) {
    const last = existing[existing.length - 1];
    const ta = last.querySelector("textarea");
    if (ta) ta.focus({ preventScroll: true });
    return;
  }
  // Otherwise: create a fresh empty comment, re-render to keep cards in
  // eltId order (matters when the cell aggregates several elt-ids), then
  // focus the new card's textarea.
  const c = addComment(docKey, eltId, "");
  renderCommentsCell(cell);
  refreshAllHandlesFor(docKey, eltId);
  const newCard = cell.querySelector(
    '.comment-card[data-comment-id="' + cssEscape(c.id) + '"]'
  );
  const ta = newCard ? newCard.querySelector("textarea") : null;
  if (ta) ta.focus({ preventScroll: true });
}

// Blur on a comment textarea → delete the comment if it has no text AND no
// review status. Keeping status-only comments lets the user just mark a
// section "Compliant" without writing any commentary.
document.addEventListener("focusout", (e) => {
  const ta = e.target;
  if (!ta.matches || !ta.matches(".comment-card .cmt-text")) return;
  if (ta.value.trim() !== "") return;
  const card = ta.closest(".comment-card");
  if (!card) return;
  if (card.dataset.reviewStatus) return; // keep status-only comments
  const docKey = card.dataset.docKey;
  const eltId = card.dataset.eltId;
  const cid = card.dataset.commentId;
  deleteComment(docKey, eltId, cid);
  const cell = card.closest(".elt-comments");
  if (cell) renderCommentsCell(cell);
  else card.remove();
  repaintStatusFor(docKey, eltId);
  refreshAllHandlesFor(docKey, eltId);
});

// Textarea live editing
document.addEventListener("input", (e) => {
  const ta = e.target;
  if (!ta.matches(".comment-card .cmt-text")) return;
  const card = ta.closest(".comment-card");
  if (!card) return;
  const docKey = card.dataset.docKey;
  const eltId = card.dataset.eltId;
  const cid = card.dataset.commentId;
  updateCommentText(docKey, eltId, cid, ta.value);
  // Live render preview
  const rendered = card.querySelector(".rendered");
  if (rendered) renderCommentMarkdownInto(rendered, ta.value);
  const meta = card.querySelector(".meta .save-status");
  if (meta) {
    meta.textContent = "saved " + new Date().toLocaleTimeString();
    clearTimeout(meta._t);
    meta._t = setTimeout(() => { meta.textContent = ""; }, 2200);
  }
  scheduleAlign();
});

// ===== Export / Import =====
document.getElementById("exportBtn").addEventListener("click", () => {
  const snapshot = allCommentsAllDocs();
  const data = {
    version: 3,
    exportedAt: new Date().toISOString(),
    doc_versions: snapshot.versions,
    comments: snapshot.comments,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "webpki-policy-comments-" + new Date().toISOString().substring(0, 10) + ".json";
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById("importFileBtn").addEventListener("click", () => {
  document.getElementById("importInput").click();
});

document.getElementById("importInput").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const obj = JSON.parse(ev.target.result);
      const defaultName = deriveSetName(file.name);
      const name = prompt("Name this comments column:", defaultName);
      if (name === null) { e.target.value = ""; return; }
      addLoadedSet(name.trim() || defaultName, obj, file.name);
    } catch (err) {
      alert("Load failed: " + err.message);
    }
    e.target.value = "";
  };
  reader.readAsText(file);
});

document.getElementById("importUrlBtn").addEventListener("click", async () => {
  const url = prompt("Comments JSON URL (must be CORS-accessible):", "");
  if (!url) return;
  try {
    const resp = await fetch(url, { mode: "cors" });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const obj = await resp.json();
    const defaultName = deriveSetName(url);
    const name = prompt("Name this comments column:", defaultName);
    if (name === null) return;
    addLoadedSet(name.trim() || defaultName, obj, url);
  } catch (err) {
    alert("Load failed: " + err.message);
  }
});

// Undo button click + keyboard shortcut
document.getElementById("undoBtn").addEventListener("click", popUndo);
document.addEventListener("keydown", (e) => {
  if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key.toLowerCase() === "z") {
    const target = e.target;
    if (target && (target.tagName === "TEXTAREA" || target.tagName === "INPUT")) return;
    e.preventDefault();
    popUndo();
  }
});

// ===== Init =====
(async () => {
  LOADED_SETS = loadLoadedSetsFromStorage();
  applySideCountVars();
  renderLoadedSetsBar();
  refreshUndoButton();
  try {
    await loadManifest();
  } catch (err) {
    const errEl = document.createElement("div");
    errEl.className = "doc-error";
    errEl.append("Failed to load ");
    const codeEl = document.createElement("code");
    codeEl.textContent = "id-manifest.json";
    errEl.append(codeEl, ": " + (err.message || String(err)));
    document.getElementById("content").replaceChildren(errEl);
    return;
  }
  buildDocNav();
  await loadDefaultReviews();
  navigateHash();
})();
</script>
</body>
</html>
